version: 2

models:
  - name: top_countries
    description: "Countries with happiness score above 6, filtered from the 2019 World Happiness Report."
    columns:
      - name: country
        description: "Country name"
        tests:
          - not_null
          - unique
      - name: happiness_score
        description: "Happiness score from the 2019 report"
        tests:
          - not_null
      - name: gdp_per_capita
        description: "GDP per capita score"

  - name: countries_tiers
    description: "Countries classified into tiers based on happiness score: Top (>=7.5), High (>=7.0), Mid (>=6.0)."
    columns:
      - name: tier
        description: "Happiness tier: Top, High, or Mid"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Top", "High", "Mid"]
